<!DOCTYPE html>
<html lang="ko" class="dark">
<head>
  <meta charset="utf-8">
  <title>Kinetic Oracle | Knowledge Hub</title>
  <!-- Google Analytics GA4 -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-6CXHMKPHPV"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-6CXHMKPHPV');
  </script>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries,typography"></script>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            bg: "#0b1326",
            surface: "#101931",
            card: "#16213e",
            primary: "#edb1ff",
            secondary: "#ffe2ab",
            tertiary: "#66dd8b"
          }
        }
      }
    }
  </script>
</head>
<body class="bg-bg text-white font-['Noto_Sans_KR'] min-h-screen relative items-center justify-center pt-20">

  <!-- Dynamic Glowing Backgrounds -->
  <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-primary/20 blur-[150px] rounded-full pointer-events-none"></div>
  <div class="absolute bottom-[-10%] right-[-10%] w-[30%] h-[40%] bg-tertiary/20 blur-[150px] rounded-full pointer-events-none"></div>
  <div class="absolute top-[20%] right-[10%] w-[20%] h-[20%] bg-secondary/10 blur-[120px] rounded-full pointer-events-none"></div>

  <main class="z-10 w-full max-w-[1400px] mx-auto p-8 relative flex flex-col items-center">
    
    <div class="text-center mb-16 select-none">
      <div class="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-slate-800/50 border border-slate-700 mb-6 text-xs font-semibold text-slate-300 tracking-wider">
        <span class="w-1.5 h-1.5 rounded-full bg-tertiary animate-pulse"></span> SYSTEM ONLINE
      </div>
      <h1 class="text-5xl md:text-6xl font-['Manrope'] font-extrabold tracking-tighter mb-4 text-transparent bg-clip-text bg-gradient-to-r from-primary via-white to-secondary pb-2">
        Kinetic Oracle Hub
      </h1>
      <p class="text-lg text-slate-400 max-w-2xl mx-auto font-light leading-relaxed">
        인과관계 기반 엔터프라이즈 지식 그래프 허브에 오신 것을 환영합니다.<br>분석할 주제(도메인)의 대시보드를 선택하세요.
      </p>
    </div>

    <div id="workspace-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 w-full">
      <!-- JS Dynamic Injection -->
    </div>

    <!-- Insights Feed Section -->
    <div class="mt-20 w-full max-w-5xl mx-auto z-10 relative pb-20">
      <div class="flex items-center gap-3 mb-8">
        <div class="w-10 h-10 bg-primary/20 flex items-center justify-center rounded-xl border border-primary/30 shadow-[0_0_15px_rgba(237,177,255,0.2)]">
          <span class="material-symbols-outlined text-primary text-xl">history_edu</span>
        </div>
        <h2 class="text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-slate-100 to-slate-400">최신 매크로 인사이트 타임라인</h2>
      </div>
      
      <div id="insights-feed-container" class="flex flex-col gap-6">
        <!-- Insights injected by JS -->
      </div>
    </div>

  </main>

  <script src="insights_data.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    const WORKSPACES = [
      {
        url: "bmnr_graph.html",
        date: "2026-04-12T11:12:00",
        displayDate: "2026-04-12 11:12",
        title: "BMNR 심층 분석",
        desc: "비트마인(Bitmine) 단기/장기 파급효과 및 이더리움 문샷 전략, 스테이블코인, 달러 패권 인과관계 분석 그래프",
        icon: "query_stats",
        cardHover: "hover:border-primary/50 hover:shadow-[0_10px_40px_rgba(237,177,255,0.15)]",
        bgGradient: "from-primary/10",
        iconClass: "bg-primary/20 text-primary border-primary/30 shadow-[0_0_15px_rgba(237,177,255,0.1)]",
        titleHover: "group-hover:text-primary",
        linkText: "text-primary"
      },
      {
        url: "iran_graph.html",
        date: "2026-04-12T12:35:00",
        displayDate: "2026-04-12 12:35",
        title: "이란 전쟁 매크로 분석",
        desc: "중동 지정학적 리스크로 촉발된 이란-이스라엘 전쟁 위기와 인플레이션, 유가, 글로벌 공급망에 미치는 거시경제적 인과관계",
        icon: "public",
        cardHover: "hover:border-rose-500/50 hover:shadow-[0_10px_40px_rgba(244,63,94,0.15)]",
        bgGradient: "from-rose-500/10",
        iconClass: "bg-rose-500/20 text-rose-400 border-rose-500/30 shadow-[0_0_15px_rgba(244,63,94,0.1)]",
        titleHover: "group-hover:text-rose-400",
        linkText: "text-rose-400"
      },
      {
        url: "generic_graph.html",
        date: "2026-03-01T10:00:00",
        displayDate: "2026-03-01 10:00",
        title: "범용 데이터 허브",
        desc: "과거부터 사용하던 기존 범용(data.js) 데이터 기반입니다. 다양한 주제 확장을 위한 테스트용 그래프입니다.",
        icon: "account_tree",
        cardHover: "hover:border-tertiary/50 hover:shadow-[0_10px_40px_rgba(102,221,139,0.15)]",
        bgGradient: "from-tertiary/10",
        iconClass: "bg-tertiary/20 text-tertiary border-tertiary/30 shadow-[0_0_15px_rgba(102,221,139,0.1)]",
        titleHover: "group-hover:text-tertiary",
        linkText: "text-tertiary"
      }
    ];

    document.addEventListener("DOMContentLoaded", () => {
      // 1. Render Workspace Grid (Sorted by Date)
      const wGrid = document.getElementById('workspace-grid');
      WORKSPACES.sort((a,b) => new Date(b.date) - new Date(a.date));
      let wHtml = '';
      WORKSPACES.forEach(w => {
        wHtml += `
          <a href="${w.url}" onclick="gtag('event','card_click',{card_title:'${w.title}',card_url:'${w.url}'});" class="group relative bg-card/60 backdrop-blur-xl border border-slate-600/40 p-8 rounded-[2rem] transition-all duration-500 flex flex-col hover:-translate-y-2 ${w.cardHover}">
            <div class="absolute inset-0 bg-gradient-to-br ${w.bgGradient} to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-500 rounded-[2rem]"></div>
            <div class="w-14 h-14 rounded-2xl flex items-center justify-center mb-4 border transition-transform duration-500 group-hover:scale-110 ${w.iconClass}">
              <span class="material-symbols-outlined text-3xl">${w.icon}</span>
            </div>
            <div class="flex items-center gap-2 mb-2">
              <span class="px-2.5 py-0.5 rounded-full text-[10px] font-mono bg-slate-800/80 border border-slate-700/80 text-slate-400">🕒 업데이트: ${w.displayDate}</span>
            </div>
            <h2 class="text-2xl font-bold mb-2 text-slate-100 transition-colors ${w.titleHover}">${w.title}</h2>
            <p class="text-slate-400 text-[13px] leading-relaxed flex-grow font-light">
              ${w.desc}
            </p>
            <div class="mt-8 flex items-center text-sm font-semibold opacity-60 group-hover:opacity-100 transition-all duration-300 transform group-hover:translate-x-1 ${w.linkText}">
              대시보드 열기 <span class="material-symbols-outlined text-base ml-1">arrow_forward</span>
            </div>
          </a>
        `;
      });
      wHtml += `
          <a href="#" onclick="alert('💡 팁: 새 그래프를 시작하시려면, \\n\\n1. bmnr_graph.html 파일을 새로 복사하시고,\\n2. 참조 데이터 이름만 바꾸시면 됩니다!'); return false;" class="group relative bg-surface-container/20 backdrop-blur-xl border border-slate-700/50 border-dashed p-8 rounded-[2rem] hover:border-secondary/50 transition-all duration-500 hover:bg-slate-800/30 flex flex-col hover:-translate-y-1 justify-center items-center text-center cursor-pointer">
            <div class="w-14 h-14 bg-slate-800/80 rounded-full flex items-center justify-center mb-5 text-slate-400 group-hover:text-secondary group-hover:bg-secondary/20 transition-all duration-500">
              <span class="material-symbols-outlined text-3xl">add</span>
            </div>
            <h2 class="text-lg font-bold text-slate-300 group-hover:text-slate-100 transition-colors">새 워크스페이스 구조 생성</h2>
            <p class="text-slate-500 text-xs mt-2">클릭하여 생성 팁 보기</p>
          </a>
      `;
      wGrid.innerHTML = wHtml;

      // 2. Render Insights Feed
      const container = document.getElementById('insights-feed-container');
      if(window.INSIGHTS_DB && window.INSIGHTS_DB.length > 0) {
        let html = '';
        window.INSIGHTS_DB.forEach(insight => {
          const parsedContent = marked.parse(insight.content);
          
          html += `
            <div class="group bg-surface/80 backdrop-blur-md border border-slate-700/50 rounded-[1.5rem] p-8 shadow-lg hover:border-primary/40 transition-all duration-300 relative overflow-hidden">
              <div class="absolute inset-0 bg-gradient-to-r from-primary/5 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-500 rounded-[1.5rem] pointer-events-none"></div>
              
              <div class="flex items-center justify-between gap-3 mb-4">
                <div class="flex items-center gap-3">
                  <span class="px-3 py-1 font-mono text-[11px] uppercase tracking-wider bg-slate-800 text-primary border border-primary/30 rounded-full shadow-[0_0_10px_rgba(237,177,255,0.1)]">
                    ${insight.date}
                  </span>
                  <span class="text-xs font-semibold text-slate-500 bg-slate-800/50 px-2 py-1 rounded-md border border-slate-700">
                    <span class="material-symbols-outlined text-[14px] align-middle mr-1">hub</span>
                    ${insight.targetGraph}
                  </span>
                </div>
              </div>
              
              <h3 class="text-2xl font-bold text-slate-100 mb-2 group-hover:text-primary transition-colors">${insight.title}</h3>
              <p class="text-secondary/80 text-sm font-semibold mb-6 border-l-2 border-secondary/50 pl-3">${insight.summary}</p>
              
              <div class="prose prose-invert prose-sm max-w-none text-slate-300">
                ${parsedContent}
              </div>
              
              <div class="mt-6 flex justify-end">
                <a href="${insight.targetGraph}" class="flex items-center text-[13px] font-semibold px-5 py-2.5 bg-slate-800 hover:bg-primary/20 hover:text-primary text-slate-300 rounded-xl transition-all border border-slate-600 hover:border-primary/50">
                  해당 대시보드 열기 <span class="material-symbols-outlined text-sm ml-1">arrow_forward</span>
                </a>
              </div>
            </div>
          `;
        });
        container.innerHTML = html;
      } else {
        container.innerHTML = '<div class="text-slate-500 text-center py-10 bg-surface/50 rounded-2xl border border-slate-800">등록된 인사이트가 없습니다.</div>';
      }
    });
  </script>
</body>
</html>
