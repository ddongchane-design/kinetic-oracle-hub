        gtag('event', 'card_click', { card_title: title, card_url: url });
      }

      // Supabase RPC 직접 fetch 호출 (keepalive 활성화)
      if (SUPABASE_ANON_KEY && SUPABASE_ANON_KEY !== "YOUR_SUPABASE_ANON_KEY" && SUPABASE_ANON_KEY !== "") {
        fetch(`${SUPABASE_URL}/rest/v1/rpc/increment_clicks`, {
          method: 'POST',
          headers: {
            'apikey': SUPABASE_ANON_KEY,
            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ target_url: url }),
          keepalive: true
        }).catch(err => console.error("Supabase click counter track error:", err));
      }
      
      // 딜레이 없이 즉시 대시보드 페이지로 이동
      window.location.href = url;
    }

    document.addEventListener("DOMContentLoaded", () => {
      // 1. Render Workspace Grid (Sorted by Date)
      // 카드 날짜를 해당 그래프의 최신 인사이트 날짜로 자동 업데이트
      if (window.INSIGHTS_DB && window.INSIGHTS_DB.length > 0) {
        WORKSPACES.forEach(w => {
          const related = window.INSIGHTS_DB.filter(ins => ins.targetGraph === w.url);
          if (related.length > 0) {
            const latest = related.reduce((a, b) => new Date(a.date) > new Date(b.date) ? a : b);
            w.date = latest.date + 'T00:00:00';
            w.displayDate = latest.date;
          }
        });
      }
      const wGrid = document.getElementById('workspace-grid');
      WORKSPACES.sort((a,b) => new Date(b.date) - new Date(a.date));
      let wHtml = '';
      WORKSPACES.forEach(w => {
        const safeId = w.url.replace(/[^a-zA-Z0-9]/g, '-');
        wHtml += `
          <a href="${w.url}" onclick="handleCardClick(event, '${w.url}', '${w.title}');" class="group relative bg-card/60 backdrop-blur-xl border border-slate-600/40 p-8 rounded-[2rem] transition-all duration-500 flex flex-col hover:-translate-y-2 ${w.cardHover}">
            <div class="absolute inset-0 bg-gradient-to-br ${w.bgGradient} to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-500 rounded-[2rem]"></div>
            <div class="flex items-center gap-3 mb-4">
              <div class="w-14 h-14 rounded-2xl flex items-center justify-center border transition-transform duration-500 group-hover:scale-110 ${w.iconClass}">
                <span class="material-symbols-outlined text-3xl">${w.icon}</span>
              </div>
              ${w.photo ? `<img src="${w.photo}" alt="픽" class="w-10 h-10 rounded-full object-cover border-2 border-amber-400/60 shadow-[0_0_12px_rgba(251,191,36,0.4)] transition-transform duration-500 group-hover:scale-110" />` : ''}
            </div>
            <div class="flex items-center gap-2 mb-2 flex-wrap">
              <span class="px-2.5 py-0.5 rounded-full text-[10px] font-mono bg-slate-800/80 border border-slate-700/80 text-slate-400">🕒 업데이트: ${w.displayDate}</span>
              ${w.pick ? `<span class="px-2.5 py-0.5 rounded-full text-[10px] font-bold bg-amber-400/20 border border-amber-400/50 text-amber-300">⭐ ${w.pick}</span>` : ''}
              <span id="click-badge-${safeId}" class="px-2.5 py-0.5 rounded-full text-[10px] font-mono bg-emerald-500/10 border border-emerald-500/30 text-emerald-400 flex items-center gap-1 shadow-[0_0_8px_rgba(52,211,153,0.1)]">
                <span class="material-symbols-outlined text-[10px] align-middle">visibility</span>
                <span class="click-count">...</span>
              </span>
            </div>
            <h2 class="text-2xl font-bold mb-2 text-slate-100 transition-colors ${w.titleHover}">${w.title}</h2>
            <p class="text-slate-400 text-[13px] leading-relaxed flex-grow font-light">
              ${w.desc}
            </p>
            ${renderEtfChips(w.url)}
            <div class="mt-8 flex items-center text-sm font-semibold opacity-60 group-hover:opacity-100 transition-all duration-300 transform group-hover:translate-x-1 ${w.linkText}">
              대시보드 열기 <span class="material-symbols-outlined text-base ml-1">arrow_forward</span>
            </div>
          </a>
        `;
      });
      wHtml += `
          <a href="#" onclick="alert('💡 팁: 새 그래프를 시작하시려면, \\n\\n1. bmnr_graph.html 파일을 새로 복사하시고,\\n2. 참조 데이터 이름만 바꾸시면 됩니다!'); return false;" class="group relative bg-surface-container/20 backdrop-blur-xl border border-slate-700/50 border-dashed p-8 rounded-[2rem] hover:border-secondary/50 transition-all duration-500 hover:bg-slate-800/30 flex flex-col hover:-translate-y-1 justify-center items-center text-center cursor-pointer">
            <div class="w-14 h-14 bg-slate-800/80 rounded-full flex items-center justify-center mb-5 text-slate-400 group-hover:text-secondary group-hover:bg-secondary/20 transition-all duration-500">
              <span class="material-symbols-outlined text-3xl">add</span>
            </div>
            <h2 class="text-lg font-bold text-slate-300 group-hover:text-slate-100 transition-colors">새 워크스페이스 구조 생성</h2>
            <p class="text-slate-500 text-xs mt-2">클릭하여 생성 팁 보기</p>
          </a>
      `;
      wGrid.innerHTML = wHtml;

      // 2. Supabase 실시간 조회수 데이터 로드 및 UI 반영
      if (supabaseClient) {
        supabaseClient
          .from('workspace_clicks')
          .select('*')
          .then(({ data, error }) => {
            if (error) {
              console.error("조회수 로드 실패:", error);
              document.querySelectorAll('.click-count').forEach(el => el.textContent = 'N/A');
              return;
            }
            const clickMap = {};
            if (data) {
              data.forEach(item => {
                clickMap[item.url] = item.clicks;
              });
            }
            WORKSPACES.forEach(w => {
              const safeId = w.url.replace(/[^a-zA-Z0-9]/g, '-');
              const countEl = document.querySelector(`#click-badge-${safeId} .click-count`);
              if (countEl) {
                countEl.textContent = clickMap[w.url] !== undefined ? clickMap[w.url] : 0;
              }
            });
          });
      } else {
        // API 키 설정 대기 중에는 플레이스홀더 표시
        document.querySelectorAll('.click-count').forEach(el => el.textContent = '-');
      }

      // 3. Render Insights Feed
      const container = document.getElementById('insights-feed-container');
      if(window.INSIGHTS_DB && window.INSIGHTS_DB.length > 0) {
        let html = '';
        const sortedInsights = [...window.INSIGHTS_DB].sort((a, b) => new Date(b.date) - new Date(a.date));
        sortedInsights.forEach(insight => {
          html += `
            <div onclick="openInsightPanel(event, '${insight.id}')" class="group bg-surface/80 backdrop-blur-md border border-slate-700/50 rounded-[1.5rem] p-8 shadow-lg hover:border-primary/40 transition-all duration-300 relative overflow-hidden cursor-pointer hover:-translate-y-1 hover:shadow-primary/5">
              <div class="absolute inset-0 bg-gradient-to-r from-primary/5 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-500 rounded-[1.5rem] pointer-events-none"></div>
              
              <div class="flex items-center justify-between gap-3 mb-4">
                <div class="flex items-center gap-3">
                  <span class="px-3 py-1 font-mono text-[11px] uppercase tracking-wider bg-slate-800 text-primary border border-primary/30 rounded-full shadow-[0_0_10px_rgba(237,177,255,0.1)]">
                    ${insight.date}
                  </span>
                  <span class="text-xs font-semibold text-slate-500 bg-slate-800/50 px-2 py-1 rounded-md border border-slate-700">
                    <span class="material-symbols-outlined text-[14px] align-middle mr-1">hub</span>
                    ${insight.targetGraph}
                  </span>
                </div>
              </div>
              
              <h3 class="text-2xl font-bold text-slate-100 mb-2 group-hover:text-primary transition-colors">${insight.title}</h3>
              <p class="text-secondary/80 text-sm font-semibold mb-4 border-l-2 border-secondary/50 pl-3 leading-relaxed">${insight.summary}</p>
              
              ${renderEtfChips(insight.targetGraph)}
              
              <div class="mt-6 flex justify-end">
                <span class="flex items-center text-[13px] font-semibold px-5 py-2.5 bg-slate-800 group-hover:bg-primary/20 group-hover:text-primary text-slate-300 rounded-xl transition-all border border-slate-600 group-hover:border-primary/40">
                  상세 분석 읽기 <span class="material-symbols-outlined text-sm ml-1">menu_open</span>
                </span>
              </div>
            </div>
          `;
        });
        container.innerHTML = html;
      } else {
        container.innerHTML = '<div class="text-slate-500 text-center py-10 bg-surface/50 rounded-2xl border border-slate-800">등록된 인사이트가 없습니다.</div>';
      }
    });

    // --- Slide-out Panel Event Handlers ---
    function openInsightPanel(event, id) {
      if (event) {
        event.stopPropagation();
      }
      
      const insight = window.INSIGHTS_DB.find(ins => ins.id === id);
      if (!insight) return;

      const backdrop = document.getElementById('insight-backdrop');
      const panel = document.getElementById('insight-panel');
      const titleEl = document.getElementById('panel-title');
      const summaryEl = document.getElementById('panel-summary');
      const contentEl = document.getElementById('panel-content');
      const etfsEl = document.getElementById('panel-etfs');
      const linkEl = document.getElementById('panel-link');
      const metaEl = document.getElementById('panel-meta');

      // Meta Info
      metaEl.innerHTML = `
        <span class="px-3 py-1 font-mono text-[11px] uppercase tracking-wider bg-slate-800 text-primary border border-primary/30 rounded-full shadow-[0_0_10px_rgba(237,177,255,0.1)]">
          ${insight.date}
        </span>
        <span class="text-xs font-semibold text-slate-500 bg-slate-800/50 px-2 py-1 rounded-md border border-slate-700">
          <span class="material-symbols-outlined text-[14px] align-middle mr-1">hub</span>
          ${insight.targetGraph}
        </span>
      `;

      // Title & Summary
      titleEl.textContent = insight.title;
      summaryEl.textContent = insight.summary;

      // Markdown Content
      if (window.marked) {
        contentEl.innerHTML = window.marked.parse(insight.content);
      } else {
        contentEl.textContent = insight.content;
      }

      // ETFs
      etfsEl.innerHTML = renderEtfChips(insight.targetGraph);

      // Target Graph Link
      linkEl.href = insight.targetGraph;
      linkEl.onclick = (e) => {
        handleCardClick(e, insight.targetGraph, insight.title);
      };

      // Show Panel & Backdrop
      backdrop.classList.remove('opacity-0', 'pointer-events-none');
      backdrop.classList.add('opacity-100', 'pointer-events-auto');
      panel.classList.remove('translate-x-full');
      panel.classList.add('translate-x-0');

      // Prevent background scrolling
      document.body.classList.add('overflow-hidden');
    }

    function closeInsightPanel() {
      const backdrop = document.getElementById('insight-backdrop');
      const panel = document.getElementById('insight-panel');

      // Hide Panel & Backdrop
      if (backdrop && panel) {
        backdrop.classList.remove('opacity-100', 'pointer-events-auto');
        backdrop.classList.add('opacity-0', 'pointer-events-none');
        panel.classList.remove('translate-x-0');
        panel.classList.add('translate-x-full');
      }

      // Allow background scrolling
      document.body.classList.remove('overflow-hidden');
    }

    // Set Close Listeners
    document.addEventListener('DOMContentLoaded', () => {
      const backdrop = document.getElementById('insight-backdrop');
      if (backdrop) {
        backdrop.addEventListener('click', closeInsightPanel);
      }

      // ESC Key close
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
          closeInsightPanel();
        }
      });
    });
  </script>
</body>
</html>
