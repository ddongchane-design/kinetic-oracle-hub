<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
// ── Starfield ──
(function() {
  const sc=document.getElementById('star-canvas'), sx=sc.getContext('2d'); let stars=[];
  function resizeStar(){ sc.width=window.innerWidth; sc.height=window.innerHeight; stars=[];
    for(let i=0;i<220;i++) stars.push({x:Math.random()*sc.width,y:Math.random()*sc.height,r:Math.random()*1.4+0.2,o:Math.random()*0.6+0.1,speed:Math.random()*0.15+0.02,phase:Math.random()*Math.PI*2}); }
  function drawStar(t){ sx.clearRect(0,0,sc.width,sc.height);
    stars.forEach(s=>{ const ao=s.o*(0.7+0.3*Math.sin(t*0.001*s.speed+s.phase)); sx.beginPath(); sx.arc(s.x,s.y,s.r,0,Math.PI*2); sx.fillStyle=`rgba(192,230,218,${ao})`; sx.fill(); });
    requestAnimationFrame(drawStar); }
  window.addEventListener('resize',resizeStar); resizeStar(); drawStar(0);
})();

// ── Insights ──
function renderInsights() {
  const container=document.getElementById('insight-panel-content');
  if(!window.INSIGHTS_DB){ container.innerHTML='<div class="text-sm opacity-40 text-center py-10 text-[#6ab5a8]">인사이트 데이터가 없습니다.</div>'; return; }
  const filtered=window.INSIGHTS_DB.filter(ins=>ins.targetGraph==='jeju_graph.html');
  if(!filtered.length){ container.innerHTML='<div class="text-sm opacity-40 text-center py-10 text-[#6ab5a8]">등록된 인사이트가 없습니다.</div>'; return; }
  const sorted=[...filtered].sort((a,b)=>new Date(b.date)-new Date(a.date));
  let html='';
  sorted.forEach(ins=>{
    const pContent=marked.parse(ins.content);
    const clickable=ins.targetNodes&&ins.targetNodes.length>0;
    const onClickAttr=clickable?`onclick="gtag('event','insight_click',{insight_title:'${ins.title.replace(/'/g,'')}',workspace:'jeju_graph'}); window.focusNode && window.focusNode('${ins.targetNodes[0]}');"`:'';
    const hoverClass=clickable?'cursor-pointer hover:border-[#2dd4bf]/40 hover:-translate-y-0.5 hover:shadow-lg hover:shadow-[#2dd4bf]/10 transition-all duration-200':'';
    html+=`<div class="bg-[#0e221a]/80 border border-[#2dd4bf]/15 rounded-2xl p-4 ${hoverClass}" ${onClickAttr}>
      <div class="flex justify-between items-start mb-2">
        <div class="text-[10px] font-mono opacity-50 bg-black/30 px-2 py-0.5 rounded-md">${ins.date}</div>
        ${clickable?`<span class="material-symbols-outlined text-[14px] text-[#2dd4bf]/50">touch_app</span>`:''}
      </div>
      <h3 class="font-bold text-[#c0ddd6] text-[14px] mb-1.5 leading-snug">${ins.title}</h3>
      <p class="text-[11px] text-[#a3e635] font-semibold mb-3 border-l-2 border-[#a3e635]/40 pl-2">${ins.summary}</p>
      <div class="prose prose-invert prose-sm max-w-none text-[12px] leading-relaxed text-[#6ab5a8]">${pContent}</div>
    </div>`;
  });
  container.innerHTML=html;
}

// ── Graph Engine ──
const COL={ event:'#2dd4bf', cause:'#fb923c', effect:'#a3e635' };
const RAD={ event:26, cause:17, effect:15 };
const PICK_NODES = ['ev_jj_1', 'ev_jj_2', 'ef_jj_2'];
let G={nodes:[],edges:[]}, camera={x:0,y:0,s:1};
let drag=null,pan=null,hovered=null,selected=null,showL=true;
let raf=null,alpha=0,searchQuery='',searchMatches=[],pendingDelete=null,hasChanges=false,activeFilter=null;
const canvas=document.getElementById('gc'), ctx=canvas.getContext('2d');
const tip=document.getElementById('tip'), ctxMenu=document.getElementById('ctx-menu');

function resizeCanvas(){ const r=canvas.parentElement.getBoundingClientRect(); canvas.width=r.width; canvas.height=r.height; }
window.addEventListener('resize',()=>{ resizeCanvas(); fitView(); }); resizeCanvas();

async function loadData(){
  try{
    if(window.DATA) G=JSON.parse(JSON.stringify(window.DATA)); else G={nodes:[],edges:[]};
    G.nodes.forEach(n=>{ n.vx=0; n.vy=0; if(n.x==null){n.x=null;n.y=null;} });
    initPositions(); updateStats(); updateListTab(); hasChanges=false;
    document.getElementById('save-btn').style.display='none';
    startSim(1.0); setTimeout(fitView,600); window.focusNode=focusNode; renderInsights();
  } catch(e){ console.error(e); }
}

function initPositions(){
  const W=canvas.width||800, H=canvas.height||600;
  const events=G.nodes.filter(n=>n.type==='event'), causes=G.nodes.filter(n=>n.type==='cause'), effects=G.nodes.filter(n=>n.type==='effect');
  events.forEach((n,i)=>{ if(n.x==null){n.x=W/2+(i-(events.length-1)/2)*220+(Math.random()-.5)*40;n.y=H/2+(Math.random()-.5)*60;} n.vx=0;n.vy=0; });
  causes.forEach((n,i)=>{ if(n.x==null){n.x=W*0.18+(Math.random()-.5)*50;n.y=80+i*(H-160)/Math.max(causes.length-1,1)+(Math.random()-.5)*25;} n.vx=0;n.vy=0; });
  effects.forEach((n,i)=>{ if(n.x==null){n.x=W*0.82+(Math.random()-.5)*50;n.y=80+i*(H-160)/Math.max(effects.length-1,1)+(Math.random()-.5)*25;} n.vx=0;n.vy=0; });
}

function startSim(a){ alpha=a; if(!raf) loop(); }
function loop(){ if(alpha>0.003){tick();alpha*=0.965;} draw(); raf=requestAnimationFrame(loop); }
function tick(){
  G.nodes.forEach(n=>{n.vx*=0.76;n.vy*=0.76;});
  for(let i=0;i<G.nodes.length;i++) for(let j=i+1;j<G.nodes.length;j++){
    const a=G.nodes[i],b=G.nodes[j],dx=b.x-a.x,dy=b.y-a.y,d=Math.sqrt(dx*dx+dy*dy)||1,f=-3000/(d*d)*alpha,fx=dx/d*f,fy=dy/d*f;
    a.vx+=fx;a.vy+=fy;b.vx-=fx;b.vy-=fy;
  }
  G.edges.forEach(e=>{
    const a=G.nodes.find(n=>n.id===e.from),b=G.nodes.find(n=>n.id===e.to); if(!a||!b) return;
    const dx=b.x-a.x,dy=b.y-a.y,d=Math.sqrt(dx*dx+dy*dy)||1,tgt=e.shared?220:130,f=(d-tgt)*0.06*alpha,fx=dx/d*f,fy=dy/d*f;
    a.vx+=fx;a.vy+=fy;b.vx-=fx;b.vy-=fy;
  });
  const W=canvas.width,H=canvas.height;
  G.nodes.forEach(n=>{n.x=Math.max(28,Math.min(W-28,n.x+n.vx));n.y=Math.max(28,Math.min(H-28,n.y+n.vy));});
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height); ctx.save(); ctx.translate(camera.x,camera.y); ctx.scale(camera.s,camera.s);
  const now=Date.now();
  G.edges.forEach(e=>{
    const a=G.nodes.find(n=>n.id===e.from),b=G.nodes.find(n=>n.id===e.to); if(!a||!b) return;
    const isConnSel=selected&&(e.from===selected.id||e.to===selected.id);
    const isConnFlt=activeFilter&&(a.type===activeFilter||b.type===activeFilter);
    const isConn=selected?isConnSel:(activeFilter?isConnFlt:false);
    const fadeOut=selected?!isConnSel:(activeFilter?!isConnFlt:false);
    ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y);
    let grad=ctx.createLinearGradient(a.x,a.y,b.x,b.y);
    let ca=COL[a.type]||'#fff',cb=COL[b.type]||'#fff';
    if(a.type==='effect'&&a.sentiment==='neg') ca='#f87171';
    if(b.type==='effect'&&b.sentiment==='neg') cb='#f87171';
    let al=fadeOut?'11':(e.shared?'BB':'55'); if(isConn) al='FF';
    grad.addColorStop(0,ca+al); grad.addColorStop(1,cb+al);
    ctx.strokeStyle=grad; ctx.lineWidth=(isConn?2.5:(e.shared?1.5:0.8))/camera.s;
    if(isConn){ctx.shadowColor=cb;ctx.shadowBlur=12;}
    ctx.setLineDash(e.shared?[4,4]:[]); ctx.stroke(); ctx.setLineDash([]); ctx.shadowBlur=0;
    if(isConn&&!e.shared){const t=(now%1000)/1000,px=a.x+(b.x-a.x)*t,py=a.y+(b.y-a.y)*t;ctx.beginPath();ctx.arc(px,py,3/camera.s,0,Math.PI*2);ctx.fillStyle='#fff';ctx.fill();ctx.beginPath();ctx.arc(px,py,8/camera.s,0,Math.PI*2);ctx.fillStyle=cb+'99';ctx.fill();}
    if(!e.shared){const ang=Math.atan2(b.y-a.y,b.x-a.x),r=(RAD[b.type]||14)+3,tx=b.x-Math.cos(ang)*r,ty=b.y-Math.sin(ang)*r;ctx.beginPath();ctx.moveTo(tx,ty);ctx.lineTo(tx-10*Math.cos(ang-.42),ty-10*Math.sin(ang-.42));ctx.lineTo(tx-10*Math.cos(ang+.42),ty-10*Math.sin(ang+.42));ctx.fillStyle=cb+(fadeOut?'11':(isConn?'FF':'88'));ctx.fill();}
    if(e.shared&&e.label&&showL&&!fadeOut){const mx=(a.x+b.x)/2,my=(a.y+b.y)/2;ctx.font='10px "Inter","Noto Sans KR",sans-serif';ctx.fillStyle='rgba(192,221,214,0.8)';ctx.textAlign='center';ctx.fillText(e.label,mx,my-6);}
  });
  G.nodes.forEach(n=>{
    let r=RAD[n.type]||14;
    const isH=hovered&&hovered.id===n.id,isS=selected&&selected.id===n.id,isMatch=searchQuery&&searchMatches.includes(n.id);
    const isConnNodeSel=selected&&(n.id===selected.id||G.edges.some(e=>(e.from===selected.id&&e.to===n.id)||(e.to===selected.id&&e.from===n.id)));
    const isConnNodeFlt=activeFilter&&(n.type===activeFilter||G.edges.some(e=>(e.from===n.id&&G.nodes.find(o=>o.id===e.to)?.type===activeFilter)||(e.to===n.id&&G.nodes.find(o=>o.id===e.from)?.type===activeFilter)));
    const isConnNode=selected?isConnNodeSel:(activeFilter?isConnNodeFlt:false);
    const fadeOutNode=selected?!isConnNodeSel:(activeFilter?!isConnNodeFlt:false);
    let col=COL[n.type]||'#888';
    if(n.type==='effect') col=n.sentiment==='neg'?'#f87171':'#a3e635';
    if(isMatch){ctx.beginPath();ctx.arc(n.x,n.y,r+16,0,Math.PI*2);ctx.fillStyle=col+'1A';ctx.fill();ctx.beginPath();ctx.arc(n.x,n.y,r+10,0,Math.PI*2);ctx.strokeStyle=col+'88';ctx.lineWidth=1.5/camera.s;ctx.stroke();}
    if(isH||isS){r*=1.15;ctx.beginPath();ctx.arc(n.x,n.y,r+8,0,Math.PI*2);ctx.fillStyle=col+'22';ctx.fill();}
    if(isS){r*=1.15;ctx.beginPath();ctx.arc(n.x,n.y,r+4,0,Math.PI*2);ctx.strokeStyle=col;ctx.lineWidth=2/camera.s;ctx.stroke();}
    let grd=ctx.createRadialGradient(n.x,n.y,r*0.5,n.x,n.y,r*2);grd.addColorStop(0,col);grd.addColorStop(1,col+'00');
    ctx.beginPath();ctx.arc(n.x,n.y,r*2,0,Math.PI*2);ctx.fillStyle=grd;ctx.globalAlpha=fadeOutNode?0.05:0.2;ctx.fill();ctx.globalAlpha=1;
    ctx.beginPath();ctx.arc(n.x,n.y,r,0,Math.PI*2);ctx.fillStyle=col;ctx.globalAlpha=fadeOutNode?0.15:(isH||isS?1:.8);ctx.fill();ctx.globalAlpha=1;
    ctx.beginPath();ctx.arc(n.x,n.y,r*0.3,0,Math.PI*2);ctx.fillStyle='#050d0a';ctx.globalAlpha=fadeOutNode?0.2:0.6;ctx.fill();ctx.globalAlpha=1;
    if(showL&&!fadeOutNode){
      let lbl=n.label.length>12?n.label.slice(0,11)+'…':n.label;
      if(n.type==='effect') lbl=(n.sentiment==='neg'?'▼ ':'▲ ')+lbl;
      ctx.font=(n.type==='event'?'bold ':'')+'11px "Inter","Noto Sans KR",sans-serif';
      ctx.fillStyle=isH||isS?'#fff':'rgba(192,221,214,0.85)';ctx.textAlign='center';ctx.fillText(lbl,n.x,n.y+r+14);
    }
    // PICK badge
    const isPick = PICK_NODES.includes(n.id);
    if(isPick && !fadeOutNode) {
      const pulse = 0.6 + 0.4 * Math.sin(now * 0.0022);
      const pr = r + 16;
      ctx.beginPath(); ctx.arc(n.x, n.y, pr+10, 0, Math.PI*2);
      ctx.fillStyle = `rgba(251,191,36,${0.07*pulse})`; ctx.fill();
      ctx.beginPath(); ctx.arc(n.x, n.y, pr, 0, Math.PI*2);
      ctx.strokeStyle = `rgba(251,191,36,${0.85*pulse})`;
      ctx.lineWidth = 2.2/camera.s;
      ctx.shadowColor='#fbbf24'; ctx.shadowBlur=16*pulse;
      ctx.stroke(); ctx.shadowBlur=0;
      const bText = '★ PICK';
      ctx.font = `bold ${10/camera.s}px "Inter",sans-serif`;
      ctx.textAlign = 'center';
      const tw = ctx.measureText(bText).width;
      const bw=tw+12, bh=16/camera.s, bx=n.x-bw/2, by=n.y-pr-bh-4;
      ctx.fillStyle=`rgba(251,191,36,${0.95*pulse})`;
      ctx.beginPath();
      if(ctx.roundRect) { ctx.roundRect(bx,by,bw,bh,4/camera.s); } else { ctx.rect(bx,by,bw,bh); }
      ctx.fill();
      ctx.fillStyle='#0a0a0a';
      ctx.fillText(bText, n.x, by+bh*0.72);
    }
  });
  ctx.restore();
}

function nodeAt(x,y){ const wx=(x-camera.x)/camera.s,wy=(y-camera.y)/camera.s; for(let i=G.nodes.length-1;i>=0;i--){const n=G.nodes[i],r=(RAD[n.type]||14)+6;if(Math.hypot(n.x-wx,n.y-wy)<r) return n;} return null; }

canvas.addEventListener('mousedown',e=>{ if(e.button===2) return; hideCtxMenu(); const r=canvas.getBoundingClientRect(),x=e.clientX-r.left,y=e.clientY-r.top,nd=nodeAt(x,y); if(nd) drag={node:nd,ox:x,oy:y,nx:nd.x,ny:nd.y}; else pan={sx:x,sy:y,cx:camera.x,cy:camera.y}; });
canvas.addEventListener('contextmenu',e=>{ e.preventDefault(); const r=canvas.getBoundingClientRect(),x=e.clientX-r.left,y=e.clientY-r.top,nd=nodeAt(x,y); if(nd){selected=nd;showCtxMenu(e.clientX,e.clientY);} });
canvas.addEventListener('mousemove',e=>{
  const r=canvas.getBoundingClientRect(),x=e.clientX-r.left,y=e.clientY-r.top;
  if(drag){drag.node.x=drag.nx+(x-drag.ox)/camera.s;drag.node.y=drag.ny+(y-drag.oy)/camera.s;return;}
  if(pan){camera.x=pan.cx+(x-pan.sx);camera.y=pan.cy+(y-pan.sy);return;}
  const nd=nodeAt(x,y);hovered=nd||null;canvas.style.cursor=nd?'pointer':'grab';
  if(nd){tip.style.display='block';tip.style.left=Math.min(e.clientX+14,window.innerWidth-240)+'px';tip.style.top=Math.max(e.clientY+14,10)+'px';tip.querySelector('.tt').textContent=nd.label;
    const tm={event:'핵심 사건',cause:'원인·배경',effect:'파급효과'+(nd.depth?' · '+nd.depth:'')+(nd.sentiment==='pos'?' (긍정)':nd.sentiment==='neg'?' (부정)':'')};
    const tc=tip.querySelector('.tc');tc.textContent=tm[nd.type]||'';let tCol=COL[nd.type]||'#888';if(nd.type==='effect') tCol=nd.sentiment==='neg'?'#f87171':'#a3e635';tc.style.color=tCol;tip.querySelector('.td').textContent=nd.desc||'';
  } else tip.style.display='none';
});
canvas.addEventListener('mouseup',e=>{ const r=canvas.getBoundingClientRect(),x=e.clientX-r.left,y=e.clientY-r.top; if(drag&&Math.hypot(x-drag.ox,y-drag.oy)<5){const nd=nodeAt(x,y);if(nd)selectNode(nd);} else if(pan&&Math.hypot(x-pan.sx,y-pan.sy)<5){if(selected||activeFilter){if(activeFilter)toggleFilter(activeFilter);selected=null;document.getElementById('no-sel').classList.remove('hidden');document.getElementById('det').classList.add('hidden');fitView();}} drag=null;pan=null; });
canvas.addEventListener('wheel',e=>{ e.preventDefault();const r=canvas.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top,d=e.deltaY>0?.88:1.14;camera.x=mx-(mx-camera.x)*d;camera.y=my-(my-camera.y)*d;camera.s=Math.max(.15,Math.min(5,camera.s*d)); },{passive:false});

let initialPinchDistance=null,initialCameraS=null;
function getTouchPos(e,i=0){const r=canvas.getBoundingClientRect();return{x:e.touches[i].clientX-r.left,y:e.touches[i].clientY-r.top};}
canvas.addEventListener('touchstart',e=>{if(e.touches.length===1){const p=getTouchPos(e),nd=nodeAt(p.x,p.y);if(nd)drag={node:nd,ox:p.x,oy:p.y,nx:nd.x,ny:nd.y};else pan={sx:p.x,sy:p.y,cx:camera.x,cy:camera.y};}else if(e.touches.length===2){drag=null;pan=null;const p1=getTouchPos(e,0),p2=getTouchPos(e,1);initialPinchDistance=Math.hypot(p1.x-p2.x,p1.y-p2.y);initialCameraS=camera.s;}},{passive:false});
canvas.addEventListener('touchmove',e=>{e.preventDefault();if(e.touches.length===1){const p=getTouchPos(e);if(drag){drag.node.x=drag.nx+(p.x-drag.ox)/camera.s;drag.node.y=drag.ny+(p.y-drag.oy)/camera.s;}else if(pan){camera.x=pan.cx+(p.x-pan.sx);camera.y=pan.cy+(p.y-pan.sy);}}else if(e.touches.length===2&&initialPinchDistance){const p1=getTouchPos(e,0),p2=getTouchPos(e,1);camera.s=Math.max(.15,Math.min(5,initialCameraS*Math.hypot(p1.x-p2.x,p1.y-p2.y)/initialPinchDistance));}},{passive:false});
canvas.addEventListener('touchend',()=>{drag=null;pan=null;initialPinchDistance=null;});

function handleSearch(q){
  searchQuery=q.trim().toLowerCase();
  if(!searchQuery){searchMatches=[];document.getElementById('search-results-list').innerHTML='<div class="text-center opacity-40 text-xs py-10">상단 검색창에 키워드를 입력하세요.</div>';return;}
  switchTab('search');
  searchMatches=G.nodes.filter(n=>(n.label+' '+(n.desc||'')).toLowerCase().includes(searchQuery)).map(n=>n.id);
  const results=G.nodes.filter(n=>searchMatches.includes(n.id));
  if(!results.length){document.getElementById('search-results-list').innerHTML='<div class="text-center opacity-40 text-xs py-10">검색 결과가 없습니다.</div>';return;}
  const tm={event:'핵심 사건',cause:'원인·배경',effect:'파급효과'};
  document.getElementById('search-results-list').innerHTML=results.map(n=>{
    let tCol=COL[n.type]||'#888';if(n.type==='effect') tCol=n.sentiment==='neg'?'#f87171':'#a3e635';
    const hl=n.label.replace(new RegExp(searchQuery,'gi'),m=>`<mark class="bg-[#2dd4bf]/30 text-[#5eead4] rounded px-0.5">${m}</mark>`);
    return `<div class="p-3 rounded-lg bg-[#142b21]/50 border border-[#2dd4bf]/15 mb-2 cursor-pointer hover:border-[#2dd4bf]/40 transition-all" onclick="focusNode('${n.id}')"><div class="text-sm font-semibold mb-1 text-[#c0ddd6]">${hl}</div><div class="text-[10px] opacity-70 flex items-center gap-1" style="color:${tCol}"><span class="w-1.5 h-1.5 rounded-full" style="background:${tCol}"></span>${tm[n.type]||n.type}${n.depth?' · '+n.depth:''}</div></div>`;
  }).join('');
}
document.getElementById('search-input').addEventListener('input',e=>handleSearch(e.target.value));

function focusNode(id){const nd=G.nodes.find(n=>n.id===id);if(!nd) return;selectNode(nd);camera.x=canvas.width/2-nd.x*camera.s-150;camera.y=canvas.height/2-nd.y*camera.s;}

  det.innerHTML=`<div class="space-y-1"><span class="text-[10px] uppercase font-bold tracking-widest flex items-center gap-2" style="color:${col}"><span class="w-2 h-2 rounded-full animate-pulse" style="background:${col}"></span>${tTitle}</span><h2 class="font-['Manrope'] font-bold text-lg text-[#c0ddd6] leading-tight mt-1 mb-2">${nd.label}</h2><div class="flex gap-1 mb-3">${tagsHTML}</div></div>
  <div class="p-3 rounded-lg bg-[#142b21]/50 border border-[#2dd4bf]/10 shadow-inner"><p class="text-[#6ab5a8] text-xs leading-relaxed">${nd.desc||'설명이 없습니다.'}</p></div>
  <div class="space-y-4 mt-2 flex-grow">

  </div>
  <button onclick="confirmDelete()" class="mt-6 w-full py-2.5 rounded-lg border border-[#f87171]/30 text-[#f87171] font-bold text-xs hover:bg-[#f87171]/10 active:scale-95 duration-200 flex justify-center items-center gap-1"><span class="material-symbols-outlined text-[16px]">delete</span> 노드 삭제</button>`;

function switchTab(t){

  ['detail','list','search'].forEach(tab=>{document.getElementById('tab-btn-'+tab).className='flex-1 py-1.5 text-xs font-semibold rounded-md transition-all ease-in-out text-[#6ab5a8] hover:bg-[#1c3a2c]';});

function toggleFilter(t){

  if(activeFilter){selected=null;document.getElementById('no-sel').classList.remove('hidden');document.getElementById('det').classList.add('hidden');}

function focusSelected(){hideCtxMenu();if(selected)selectNode(selected);}
function confirmDelete(){hideCtxMenu();if(!selected) return;pendingDelete=selected;const connCount=G.edges.filter(e=>e.from===selected.id||e.to===selected.id).length;document.getElementById('modal-msg').textContent=`"${selected.label}" 관련 엣지 ${connCount}개가 함께 삭제됩니다.`;document.getElementById('modal-overlay').classList.add('show');}

function executeDelete(){if(!pendingDelete) return;const id=pendingDelete.id;G.nodes=G.nodes.filter(n=>n.id!==id);G.edges=G.edges.filter(e=>e.from!==id&&e.to!==id);if(selected&&selected.id===id){selected=null;document.getElementById('no-sel').classList.remove('hidden');document.getElementById('det').classList.add('hidden');}pendingDelete=null;closeModal();updateStats();updateListTab();hasChanges=true;document.getElementById('save-btn').style.display='block';startSim(.4);}

function updateListTab(){
  const listEl=document.getElementById('tab-list');
  const causes=G.nodes.filter(n=>n.type==='cause'),events=G.nodes.filter(n=>n.type==='event'),effects=G.nodes.filter(n=>n.type==='effect');
  const rc=(title,items,color)=>{ if(!items.length) return '';
    return `<div><div class="text-[11px] uppercase font-bold tracking-widest mb-3 flex items-center gap-2" style="color:${color}"><span class="w-1.5 h-1.5 rounded-full" style="background:${color}"></span>${title}<span class="opacity-50 text-[10px]">(${items.length})</span></div><div class="flex flex-col gap-2 pl-3 border-l pb-4" style="border-color:${color}33">${items.map(n=>{let label=n.label;if(n.type==='effect') label=(n.sentiment==='neg'?'<span style="color:#f87171">▼</span> ':'<span style="color:#a3e635">▲</span> ')+label;return `<div class="text-[13px] text-[#6ab5a8] hover:text-[#c0ddd6] cursor-pointer transition-colors leading-snug break-keep" onclick="focusNode('${n.id}')" title="${n.label}">${label}</div>`;}).join('')}</div></div>`;};
  listEl.innerHTML=rc('발생 원인 (Cause)',causes,COL['cause'])+rc('핵심 사건 (Event)',events,COL['event'])+rc('파급 효과 (Effect)',effects,COL['effect']);
}
function fitView(){if(!G.nodes.length) return;const xs=G.nodes.map(n=>n.x),ys=G.nodes.map(n=>n.y),minX=Math.min(...xs),maxX=Math.max(...xs),minY=Math.min(...ys),maxY=Math.max(...ys),pad=80,cw=canvas.width,ch=canvas.height;camera.s=Math.min((cw-pad*2)/Math.max(maxX-minX,1),(ch-pad*2)/Math.max(maxY-minY,1),1.5);camera.x=pad-minX*camera.s+((cw-pad*2)-(maxX-minX)*camera.s)/2;camera.y=pad-minY*camera.s+((ch-pad*2)-(maxY-minY)*camera.s)/2;}
function zoom(f){const cx=canvas.width/2,cy=canvas.height/2;camera.x=cx-(cx-camera.x)*f;camera.y=cy-(cy-camera.y)*f;camera.s=Math.max(.15,Math.min(5,camera.s*f));}
function toggleLabels(){showL=!showL;}
function saveChanges(){const out={...G,meta:{...G.meta,version:(parseFloat(G.meta?.version||1)+0.1).toFixed(1),updated:new Date().toISOString().slice(0,10)}};const jsContent="window.DATA = "+JSON.stringify(out,null,2)+";";const blob=new Blob([jsContent],{type:'application/javascript'});const url=URL.createObjectURL(blob);const scriptName=document.getElementById('data-script').getAttribute('src');const a=document.createElement('a');a.href=url;a.download=scriptName;a.click();URL.revokeObjectURL(url);hasChanges=false;document.getElementById('save-btn').style.display='none';}
function exportJSON(){const blob=new Blob([JSON.stringify(G,null,2)],{type:'application/json'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='jeju_graph_'+new Date().toISOString().slice(0,10)+'.json';a.click();URL.revokeObjectURL(url);}
document.addEventListener('keydown',e=>{if((e.key==='Delete'||e.key==='Backspace')&&selected&&document.activeElement===document.body){e.preventDefault();confirmDelete();}if(e.key==='Escape'){closeModal();hideCtxMenu();if(searchQuery){document.getElementById('search-input').value='';handleSearch('');}}if((e.ctrlKey||e.metaKey)&&e.key==='f'){e.preventDefault();document.getElementById('search-input').focus();switchTab('search');}});

loadData(); if(!raf) loop();
