<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
function renderInsights() {
  const container = document.getElementById('insight-panel-content');
  if(!window.INSIGHTS_DB) {
    container.innerHTML = '<div class="text-sm opacity-50 text-center py-10">인사이트 데이터베이스가 없습니다.</div>';
    return;
  }
  const filtered = window.INSIGHTS_DB.filter(ins => ins.targetGraph === 'tempus_graph.html');
  if(filtered.length === 0) {
    container.innerHTML = '<div class="text-sm opacity-50 text-center py-10">이 워크스페이스에 등록된 분석글이 없습니다.</div>';
    return;
  }
  let html = '';
  filtered.forEach(ins => {
    const pContent = marked.parse(ins.content);
    let onClickAttr = ins.targetNodes && ins.targetNodes.length > 0
      ? `onclick="gtag('event','insight_click',{insight_title:'${ins.title.replace(/'/g,'')}',workspace:'tempus_graph'}); window.focusNode && window.focusNode('${ins.targetNodes[0]}');"`
      : '';
    let interactClass = ins.targetNodes && ins.targetNodes.length > 0
      ? 'cursor-pointer hover:border-amber-400/50 hover:-translate-y-0.5 hover:shadow-lg transition-all duration-200'
      : '';

    html += `
      <div class="bg-surface/60 border border-outline-variant/20 rounded-2xl p-5 shadow-md ${interactClass}" ${onClickAttr}>
        <div class="flex justify-between items-start mb-3">
          <div class="text-[11px] font-mono opacity-50 bg-black/20 inline-block px-2 py-0.5 rounded-md">${ins.date}</div>
          ${ins.targetNodes ? `<span class="material-symbols-outlined text-[16px] text-amber-400/50">touch_app</span>` : ''}
        </div>
        <h3 class="font-bold text-on-surface text-[15px] mb-2 leading-snug">${ins.title}</h3>
        <p class="text-[12px] text-secondary font-semibold mb-4 border-l-2 border-secondary/40 pl-2 opacity-90">${ins.summary}</p>
        <div class="prose prose-invert prose-sm max-w-none text-[13px] leading-relaxed text-on-surface-variant">
          ${pContent}
        </div>
      </div>
    `;
  });
  container.innerHTML = html;
}

// ==================== [JS LOGIC] ====================
const COL={ event: '#edb1ff', cause: '#ffe2ab', effect: '#66dd8b' };
const RAD={ event:24, cause:16, effect:14 };

let G={nodes:[],edges:[]};
let camera={x:0,y:0,s:1};
let drag=null,pan=null,hovered=null,selected=null,showL=true;
let raf=null,alpha=0;
let searchQuery='';
let searchMatches=[];
let pendingDelete=null;
let hasChanges=false;
let activeFilter=null;

const canvas=document.getElementById('gc');
const ctx=canvas.getContext('2d');
const tip=document.getElementById('tip');
const ctxMenu=document.getElementById('ctx-menu');

async function loadData() {
  try {
    setStatus('Loading data...');
    if (window.DATA) G = JSON.parse(JSON.stringify(window.DATA));
    else G = {nodes:[], edges:[]};
    G.nodes.forEach(n => { n.vx=n.vx||0; n.vy=n.vy||0; if(n.x==null){n.x=null;n.y=null;} });
    initPositions();
    updateStats();
    updateListTab();
    setStatus('Ready · ' + new Date().toLocaleTimeString('ko-KR'));
    hasChanges = false;
    document.getElementById('save-btn').style.display = 'none';
    startSim(1.0);
    setTimeout(fitView, 500);
    window.focusNode = focusNode;
    renderInsights();
  } catch(e) {
    setStatus('Error: ' + e.message);
  }
}

function initPositions() {
  const W = canvas.width || Math.max(800, window.innerWidth-320);
  const H = canvas.height || window.innerHeight;
  const events = G.nodes.filter(n => n.type === 'event');
  const causes = G.nodes.filter(n => n.type === 'cause');
  const effects = G.nodes.filter(n => n.type === 'effect');
  events.forEach((n, i) => {
    if (n.x == null) { n.x = W/2 + (i - (events.length-1)/2) * 200 + (Math.random()-.5)*40; n.y = H/2 + (Math.random()-.5)*60; }
    n.vx=0; n.vy=0;
  });
  causes.forEach((n, i) => {
    if (n.x == null) { n.x = W * 0.2 + (Math.random()-.5)*60; n.y = 100 + i * (H - 200) / Math.max(causes.length - 1, 1) + (Math.random()-.5)*30; }
    n.vx=0; n.vy=0;
  });
  effects.forEach((n, i) => {
    if (n.x == null) { n.x = W * 0.8 + (Math.random()-.5)*60; n.y = 100 + i * (H - 200) / Math.max(effects.length - 1, 1) + (Math.random()-.5)*30; }
    n.vx=0; n.vy=0;
  });
}

function startSim(a) { alpha = a; if (!raf) loop(); }
function loop() {
  if (alpha > 0.003) { tick(); alpha *= 0.965; }
  draw();
  raf = requestAnimationFrame(loop);
}

function tick() {
  G.nodes.forEach(n => { n.vx *= 0.76; n.vy *= 0.76; });
  for (let i = 0; i < G.nodes.length; i++) {
    for (let j = i+1; j < G.nodes.length; j++) {
      const a = G.nodes[i], b = G.nodes[j];
      const dx = b.x-a.x, dy = b.y-a.y, d = Math.sqrt(dx*dx+dy*dy)||1;
      const f = -3000/(d*d)*alpha;
      const fx = dx/d*f, fy = dy/d*f;
      a.vx+=fx; a.vy+=fy; b.vx-=fx; b.vy-=fy;
    }
  }
  G.edges.forEach(e => {
    const a = G.nodes.find(n=>n.id===e.from), b = G.nodes.find(n=>n.id===e.to);
    if (!a||!b) return;
    const dx=b.x-a.x, dy=b.y-a.y, d=Math.sqrt(dx*dx+dy*dy)||1;
    const tgt = e.shared ? 220 : 130;
    const f = (d-tgt)*0.06*alpha;
    const fx=dx/d*f, fy=dy/d*f;
    a.vx+=fx; a.vy+=fy; b.vx-=fx; b.vy-=fy;
  });
  const W=canvas.width, H=canvas.height;
  G.nodes.forEach(n => { n.x=Math.max(28,Math.min(W-28,n.x+n.vx)); n.y=Math.max(28,Math.min(H-28,n.y+n.vy)); });
}

function draw() {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.save(); ctx.translate(camera.x,camera.y); ctx.scale(camera.s,camera.s);
  const now = Date.now();

  G.edges.forEach(e => {
    const a=G.nodes.find(n=>n.id===e.from), b=G.nodes.find(n=>n.id===e.to);
    if(!a||!b) return;
    const isConnSel = selected && (e.from===selected.id || e.to===selected.id);
    const isConnFlt = activeFilter && (a.type===activeFilter || b.type===activeFilter);
    const isConn = selected ? isConnSel : (activeFilter ? isConnFlt : false);
    const fadeOut = selected ? !isConnSel : (activeFilter ? !isConnFlt : false);

    ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y);

    let grad = ctx.createLinearGradient(a.x, a.y, b.x, b.y);
    let ca = COL[a.type]||'#fff', cb = COL[b.type]||'#fff';
    if(a.type==='effect' && a.sentiment==='neg') ca='#ffb4ab';
    else if(a.type==='effect') ca='#66dd8b';
    if(b.type==='effect' && b.sentiment==='neg') cb='#ffb4ab';
    else if(b.type==='effect') cb='#66dd8b';

    let alpha = fadeOut ? '11' : (e.shared?'BB':'55');
    if (isConn) alpha = 'FF';

    grad.addColorStop(0, ca + alpha); grad.addColorStop(1, cb + alpha);
    ctx.strokeStyle = grad; ctx.lineWidth = (isConn?2.5:(e.shared?1.5:0.8))/camera.s;
    if(isConn) { ctx.shadowColor=cb; ctx.shadowBlur=12; }

    ctx.setLineDash(e.shared?[4,4]:[]); ctx.stroke(); ctx.setLineDash([]);
    ctx.shadowBlur=0;

    if(isConn && !e.shared) {
      const t = (now % 1000) / 1000;
      const px = a.x + (b.x-a.x)*t, py = a.y + (b.y-a.y)*t;
      ctx.beginPath(); ctx.arc(px,py,3/camera.s,0,Math.PI*2); ctx.fillStyle='#fff'; ctx.fill();
      ctx.beginPath(); ctx.arc(px,py,8/camera.s,0,Math.PI*2); ctx.fillStyle=cb+'99'; ctx.fill();
    }

    if(!e.shared) {
      const ang=Math.atan2(b.y-a.y,b.x-a.x); const r=(RAD[b.type]||14)+3;
      const tx=b.x-Math.cos(ang)*r, ty=b.y-Math.sin(ang)*r;
      ctx.beginPath(); ctx.moveTo(tx,ty);
      ctx.lineTo(tx-10*Math.cos(ang-.42),ty-10*Math.sin(ang-.42));
      ctx.lineTo(tx-10*Math.cos(ang+.42),ty-10*Math.sin(ang+.42));
      ctx.fillStyle=cb+(fadeOut?'11':(isConn?'FF':'88')); ctx.fill();
    }
    if(e.shared && e.label && showL && !fadeOut) {
      const mx=(a.x+b.x)/2, my=(a.y+b.y)/2;
      ctx.font='10px "Inter","Noto Sans KR",sans-serif';
      ctx.fillStyle='rgba(218,226,253,0.8)'; ctx.textAlign='center';
      ctx.fillText(e.label, mx, my-6);
    }
  });

  G.nodes.forEach(n => {
    let r=RAD[n.type]||14;
    const isH=hovered&&hovered.id===n.id, isS=selected&&selected.id===n.id;
    const isMatch=searchQuery&&searchMatches.includes(n.id);
    const isConnNodeSel = selected && (n.id===selected.id || G.edges.some(e=>(e.from===selected.id&&e.to===n.id)||(e.to===selected.id&&e.from===n.id)));
    const isConnNodeFlt = activeFilter && (n.type===activeFilter || G.edges.some(e=> (e.from===n.id && G.nodes.find(o=>o.id===e.to)?.type===activeFilter) || (e.to===n.id && G.nodes.find(o=>o.id===e.from)?.type===activeFilter)));
    const isConnNode = selected ? isConnNodeSel : (activeFilter ? isConnNodeFlt : false);
    const fadeOutNode = selected ? !isConnNodeSel : (activeFilter ? !isConnNodeFlt : false);

    let col=COL[n.type]||'#888';
    if(n.type==='effect') {
      if(n.sentiment==='pos') col='#66dd8b';
      else if(n.sentiment==='neg') col='#ffb4ab';
    }

    if(isMatch) {
      ctx.beginPath(); ctx.arc(n.x,n.y,r+16,0,Math.PI*2);
      ctx.fillStyle=col+'1A'; ctx.fill();
      ctx.beginPath(); ctx.arc(n.x,n.y,r+10,0,Math.PI*2);
      ctx.strokeStyle=col+'88'; ctx.lineWidth=1.5/camera.s; ctx.stroke();
    }
    if(isH||isS) { r *= 1.15; ctx.beginPath(); ctx.arc(n.x,n.y,r+8,0,Math.PI*2); ctx.fillStyle=col+'22'; ctx.fill(); }
    if(isS) {
      r *= 1.15; ctx.beginPath(); ctx.arc(n.x,n.y,r+4,0,Math.PI*2);
      ctx.strokeStyle=col; ctx.lineWidth=2/camera.s; ctx.stroke();
    }

    let grd = ctx.createRadialGradient(n.x, n.y, r*0.5, n.x, n.y, r*2);
    grd.addColorStop(0, col); grd.addColorStop(1, col+'00');
    ctx.beginPath(); ctx.arc(n.x,n.y,r*2,0,Math.PI*2);
    ctx.fillStyle=grd; ctx.globalAlpha=fadeOutNode?0.05:0.2; ctx.fill(); ctx.globalAlpha=1;

    ctx.beginPath(); ctx.arc(n.x,n.y,r,0,Math.PI*2);
    ctx.fillStyle=col; ctx.globalAlpha=fadeOutNode?0.15:(isH||isS?1:.8); ctx.fill(); ctx.globalAlpha=1;

    ctx.beginPath(); ctx.arc(n.x, n.y, r*0.3, 0, Math.PI*2);
    ctx.fillStyle='#0b1326'; ctx.globalAlpha=fadeOutNode?0.2:0.6; ctx.fill(); ctx.globalAlpha=1;

    if(showL && !fadeOutNode) {
      let lbl=n.label.length>12?n.label.slice(0,11)+'…':n.label;
      if(n.type==='effect'){
        if(n.sentiment==='pos') lbl = '▲ ' + lbl;
        else if(n.sentiment==='neg') lbl = '▼ ' + lbl;
      }
      ctx.font=(n.type==='event'?'bold ':'')+'11px "Inter","Noto Sans KR",sans-serif';
      ctx.fillStyle=isH||isS ? '#fff' : 'rgba(218,226,253,0.85)';
      ctx.textAlign='center'; ctx.fillText(lbl,n.x,n.y+r+14);
    }
  });
  ctx.restore();
}

function nodeAt(x,y) {
  const wx=(x-camera.x)/camera.s, wy=(y-camera.y)/camera.s;
  for (let i = G.nodes.length - 1; i >= 0; i--) {
      const n = G.nodes[i], r=(RAD[n.type]||14)+6;
      if(Math.hypot(n.x-wx,n.y-wy)<r) return n;
  }
  return null;
}

canvas.addEventListener('mousedown',e=>{
  if(e.button===2) return; hideCtxMenu();
  const r=canvas.getBoundingClientRect(),x=e.clientX-r.left,y=e.clientY-r.top;
  const nd=nodeAt(x,y);
  if(nd) drag={node:nd,ox:x,oy:y,nx:nd.x,ny:nd.y};
  else pan={sx:x,sy:y,cx:camera.x,cy:camera.y};
});

canvas.addEventListener('contextmenu',e=>{
  e.preventDefault(); const r=canvas.getBoundingClientRect(),x=e.clientX-r.left,y=e.clientY-r.top;
  const nd=nodeAt(x,y); if(nd) { selected=nd; showCtxMenu(e.clientX,e.clientY); }
});

canvas.addEventListener('mousemove',e=>{
  const r=canvas.getBoundingClientRect(),x=e.clientX-r.left,y=e.clientY-r.top;
  if(drag){drag.node.x=drag.nx+(x-drag.ox)/camera.s;drag.node.y=drag.ny+(y-drag.oy)/camera.s;return;}
  if(pan){camera.x=pan.cx+(x-pan.sx);camera.y=pan.cy+(y-pan.sy);return;}
  const nd=nodeAt(x,y); hovered=nd||null; canvas.style.cursor=nd?'pointer':'grab';
  if(nd){
    tip.style.display='block';
    tip.style.left=Math.min(e.clientX+14,window.innerWidth-230)+'px';
    tip.style.top=Math.max(e.clientY+14,10)+'px';
    tip.querySelector('.tt').textContent=nd.label;
    const tm={event:'핵심 사건',cause:'원인·배경',effect:'파급효과'+(nd.depth?' · '+nd.depth:'')+(nd.sentiment==='pos'?' (긍정)':nd.sentiment==='neg'?' (부정)':'')};
    const tc=tip.querySelector('.tc'); tc.textContent=tm[nd.type]||'';
    let tCol=COL[nd.type]||'#888';
    if(nd.type==='effect') tCol=(nd.sentiment==='pos')?'#66dd8b':(nd.sentiment==='neg'?'#ffb4ab':'#66dd8b');
    tc.style.color=tCol; tip.querySelector('.td').textContent=nd.desc||'';
  } else tip.style.display='none';
});

canvas.addEventListener('mouseup',e=>{
  const r=canvas.getBoundingClientRect(),x=e.clientX-r.left,y=e.clientY-r.top;
  if(drag&&Math.hypot(x-drag.ox,y-drag.oy)<5){
    const nd=nodeAt(x,y);if(nd)selectNode(nd);
  } else if(pan&&Math.hypot(x-pan.sx,y-pan.sy)<5){
    if(selected || activeFilter) {
      if(activeFilter) toggleFilter(activeFilter);
      selected = null;
      document.getElementById('no-sel').classList.remove('hidden');
      document.getElementById('det').classList.add('hidden');
      fitView();
    }
  }
  drag=null;pan=null;
});
canvas.addEventListener('wheel',e=>{
  e.preventDefault(); const r=canvas.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top;
  const d=e.deltaY>0?.88:1.14;
  camera.x=mx-(mx-camera.x)*d; camera.y=my-(my-camera.y)*d;
  camera.s=Math.max(.15,Math.min(5,camera.s*d));
},{passive:false});

let initialPinchDistance = null;
let initialCameraS = null;
function getTouchPos(e, i=0) {
  const r = canvas.getBoundingClientRect();
  return { x: e.touches[i].clientX - r.left, y: e.touches[i].clientY - r.top };
}
canvas.addEventListener('touchstart', e => {
  if (e.touches.length === 1) {
    const p = getTouchPos(e); const nd = nodeAt(p.x, p.y);
    if(nd) drag = {node:nd, ox:p.x, oy:p.y, nx:nd.x, ny:nd.y};
    else pan = {sx:p.x, sy:p.y, cx:camera.x, cy:camera.y};
  } else if (e.touches.length === 2) {
    drag = null; pan = null;
    const p1 = getTouchPos(e, 0), p2 = getTouchPos(e, 1);
    initialPinchDistance = Math.hypot(p1.x - p2.x, p1.y - p2.y);
    initialCameraS = camera.s;
  }
}, {passive: false});
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (e.touches.length === 1) {
    const p = getTouchPos(e);
    if(drag) {
      drag.node.x = drag.nx + (p.x - drag.ox)/camera.s;
      drag.node.y = drag.ny + (p.y - drag.oy)/camera.s;
    } else if(pan) {
      camera.x = pan.cx + (p.x - pan.sx); camera.y = pan.cy + (p.y - pan.sy);
    }
  } else if (e.touches.length === 2 && initialPinchDistance) {
    const p1 = getTouchPos(e, 0), p2 = getTouchPos(e, 1);
    const currentDist = Math.hypot(p1.x - p2.x, p1.y - p2.y);
    const scaleRatio = currentDist / initialPinchDistance;
    camera.s = Math.max(0.15, Math.min(5, initialCameraS * scaleRatio));
  }
}, {passive: false});
canvas.addEventListener('touchend', e => { drag=null; pan=null; initialPinchDistance=null; });

canvas.addEventListener('click', e => {
  hideCtxMenu();
  const r=canvas.getBoundingClientRect(),x=e.clientX-r.left,y=e.clientY-r.top;
  const nd=nodeAt(x,y);
  if(nd) { selectNode(nd); return; }
  if(selected || activeFilter) {
    if(activeFilter) toggleFilter(activeFilter);
    selected = null;
    document.getElementById('no-sel').classList.remove('hidden');
    document.getElementById('det').classList.add('hidden');
  }
});

function handleSearch(q) {
  searchQuery = q.trim().toLowerCase();
  if(!searchQuery) { searchMatches=[]; document.getElementById('search-results-list').innerHTML='<div class="text-center opacity-40 text-xs py-10">상단 검색창에 키워드를 입력하세요.</div>'; return; }
  switchTab('search');
  searchMatches = G.nodes.filter(n=>(n.label+' '+(n.desc||'')).toLowerCase().includes(searchQuery)).map(n=>n.id);
  const results = G.nodes.filter(n=>searchMatches.includes(n.id));
  if(!results.length) { document.getElementById('search-results-list').innerHTML='<div class="text-center opacity-40 text-xs py-10">검색 결과가 없습니다.</div>'; return; }
  const tm={event:'핵심 사건',cause:'원인·배경',effect:'파급효과'};
  document.getElementById('search-results-list').innerHTML = results.map(n=>{
    let tCol=COL[n.type]||'#888';
    if(n.type==='effect') tCol=(n.sentiment==='pos')?'#66dd8b':(n.sentiment==='neg'?'#ffb4ab':'#66dd8b');
    const hl = n.label.replace(new RegExp(searchQuery,'gi'), m=>`<mark class="bg-amber-400/30 text-amber-200 rounded px-0.5">${m}</mark>`);
    return `<div class="p-3 rounded-lg bg-surface-bright/30 border border-outline-variant/20 mb-2 cursor-pointer hover:bg-surface-bright/60 hover:border-amber-400/50 transition-all" onclick="focusNode('${n.id}')">
      <div class="text-sm font-semibold mb-1 text-on-surface">${hl}</div>
      <div class="text-[10px] opacity-70 flex items-center gap-1" style="color:${tCol}">
        <span class="w-1.5 h-1.5 rounded-full" style="background:${tCol}"></span> ${tm[n.type]||n.type}${n.depth?' · '+n.depth:''}
      </div>
    </div>`;
  }).join('');
}
document.getElementById('search-input').addEventListener('input', e=>handleSearch(e.target.value));

function focusNode(id) {
  const nd=G.nodes.find(n=>n.id===id); if(!nd) return; selectNode(nd);
  camera.x=canvas.width/2-nd.x*camera.s - 150; camera.y=canvas.height/2-nd.y*camera.s;
}

function selectNode(nd) {
  selected=nd; switchTab('detail');
  document.getElementById('no-sel').classList.add('hidden');
  const det=document.getElementById('det'); det.classList.remove('hidden'); det.classList.add('flex');

  let col=COL[nd.type]||'#888';
  let tTitle = nd.type==='event'?'핵심 사건':nd.type==='cause'?'발생 원인':'파급 효과';
  if(nd.type==='effect'&&nd.sentiment==='pos') col='#66dd8b';
  if(nd.type==='effect'&&nd.sentiment==='neg') { col='#ffb4ab'; tTitle='부정적 파급 효과'; }

  const linksIn = G.edges.filter(e=>e.to===nd.id).map(e=>G.nodes.find(n=>n.id===e.from)).filter(Boolean);
  const linksOut = G.edges.filter(e=>e.from===nd.id).map(e=>G.nodes.find(n=>n.id===e.to)).filter(Boolean);

  let tagsHTML = '';
  if(nd.depth) tagsHTML += `<span class="px-2 py-0.5 rounded-md text-[10px] border" style="border-color:${col}44;color:${col}">${nd.depth}</span>`;
  if(nd.type==='effect') {
    if(nd.sentiment==='pos') tagsHTML += `<span class="px-2 py-0.5 rounded-md text-[10px] border border-tertiary/40 text-tertiary font-bold">+ 긍정적</span>`;
    if(nd.sentiment==='neg') tagsHTML += `<span class="px-2 py-0.5 rounded-md text-[10px] border border-error/40 text-error font-bold">- 리스크</span>`;
  }

  det.innerHTML = `
    <div class="space-y-1">
      <span class="text-[10px] uppercase font-bold tracking-widest flex items-center gap-2" style="color:${col}">
        <span class="w-2 h-2 rounded-full animate-pulse" style="background:${col}"></span> ${tTitle}
      </span>
      <h2 class="font-headline font-bold text-lg text-on-surface leading-tight mt-1 mb-2">${nd.label}</h2>
      <div class="flex gap-1 mb-3">${tagsHTML}</div>
    </div>

    <div class="p-3 rounded-lg bg-surface-container/60 border border-outline-variant/10 shadow-inner">
      <p class="text-on-surface-variant text-xs leading-relaxed opacity-90">${nd.desc||'설명이 없습니다.'}</p>
    </div>

    <div class="space-y-4 mt-2 flex-grow">
      ${linksIn.length ? `
      <div>
        <span class="text-[10px] uppercase font-bold text-secondary tracking-widest block mb-2 opacity-80">이전 연결 (수신)</span>
        <div class="flex flex-wrap gap-1.5">
          ${linksIn.map(l=>`<span class="px-2 py-1 rounded-md bg-secondary/10 border border-secondary/20 text-[10px] text-secondary cursor-pointer hover:bg-secondary/20" onclick="selectNodeById('${l.id}')">${l.label}</span>`).join('')}
        </div>
      </div>` : ''}

      ${linksOut.length ? `
      <div>
        <span class="text-[10px] uppercase font-bold text-tertiary tracking-widest block mb-2 opacity-80">이후 연결 (발신)</span>
        <div class="flex flex-wrap gap-1.5">
          ${linksOut.map(l=>`<span class="px-2 py-1 rounded-md bg-tertiary/10 border border-tertiary/20 text-[10px] text-tertiary cursor-pointer hover:bg-tertiary/20" onclick="selectNodeById('${l.id}')">${l.label}</span>`).join('')}
        </div>
      </div>` : ''}
    </div>

    <button onclick="confirmDelete()" class="mt-auto w-full py-2.5 rounded-lg border border-error/30 text-error font-bold tracking-tight text-xs hover:bg-error/10 active:scale-95 duration-200 mt-6 flex justify-center items-center gap-1">
      <span class="material-symbols-outlined text-[16px]">delete</span> 노드 삭제
    </button>
  `;
}
function selectNodeById(id){const nd=G.nodes.find(n=>n.id===id);if(nd)selectNode(nd);}

function switchTab(t) {
  document.getElementById('tab-detail').classList.toggle('hidden', t!=='detail');
  document.getElementById('tab-detail').classList.toggle('flex', t==='detail');
  document.getElementById('tab-search').classList.toggle('hidden', t!=='search');
  document.getElementById('tab-search').classList.toggle('flex', t==='search');
  document.getElementById('tab-list').classList.toggle('hidden', t!=='list');
  document.getElementById('tab-list').classList.toggle('flex', t==='list');

  const bd = document.getElementById('tab-btn-detail');
  const bl = document.getElementById('tab-btn-list');
  const bs = document.getElementById('tab-btn-search');

  [bd, bl, bs].forEach(b => b.className = 'flex-1 py-1.5 text-xs font-semibold rounded-md transition-all ease-in-out text-on-surface-variant hover:bg-surface-bright/50');

  const activeBtn = t==='detail' ? bd : t==='list' ? bl : bs;
  activeBtn.className = 'flex-1 py-1.5 text-xs font-semibold rounded-md transition-all ease-in-out bg-amber-400/20 text-amber-400';
}

function toggleFilter(t) {
  if (activeFilter === t) activeFilter = null;
  else activeFilter = t;

  if (activeFilter) {
    selected = null;
    document.getElementById('no-sel').classList.remove('hidden');
    document.getElementById('det').classList.add('hidden');
  }

  const btns = {
    'cause': { ids: ['flt-cause', 'flt-cause-m'], c: '#ffe2ab' },
    'event': { ids: ['flt-event', 'flt-event-m'], c: '#edb1ff' },
    'effect': { ids: ['flt-effect', 'flt-effect-m'], c: '#66dd8b' }
  };

  Object.keys(btns).forEach(k => {
    btns[k].ids.forEach(id => {
      const b = document.getElementById(id);
      if (!b) return;
      if (k === activeFilter) {
        b.style.backgroundColor = btns[k].c + '33';
        b.style.color = btns[k].c;
      } else {
        b.style.backgroundColor = 'transparent';
        b.style.color = '';
      }
    });
  });
}

function showCtxMenu(x,y) {
  ctxMenu.style.display='block'; ctxMenu.style.left=Math.min(x,window.innerWidth-150)+'px'; ctxMenu.style.top=Math.min(y,window.innerHeight-100)+'px';
}
function hideCtxMenu() { ctxMenu.style.display='none'; }
function focusSelected() { hideCtxMenu(); if(selected) selectNode(selected); }

function confirmDelete() {
  hideCtxMenu(); if(!selected) return; pendingDelete=selected;
  const connCount=G.edges.filter(e=>e.from===selected.id||e.to===selected.id).length;
  document.getElementById('modal-msg').textContent=`"${selected.label}" 관련 엣지 ${connCount}개가 함께 삭제됩니다.`;
  document.getElementById('modal-overlay').classList.add('show');
}
function closeModal() { document.getElementById('modal-overlay').classList.remove('show'); pendingDelete=null; }

function executeDelete() {
  if(!pendingDelete) return; const id=pendingDelete.id;
  G.nodes=G.nodes.filter(n=>n.id!==id); G.edges=G.edges.filter(e=>e.from!==id&&e.to!==id);
  if(selected&&selected.id===id) { selected=null; document.getElementById('no-sel').classList.remove('hidden'); document.getElementById('det').classList.add('hidden'); }
  pendingDelete=null; closeModal(); updateStats(); updateListTab(); handleSearch(searchQuery); hasChanges=true;
  document.getElementById('save-btn').style.display='block'; setStatus(`Node deleted.`); startSim(.4);
}

function updateStats() {
  document.getElementById('hstats-nodes').textContent=`Nodes: ${G.nodes.length}`;
  document.getElementById('hstats-edges').textContent=`Edges: ${G.edges.length}`;
}

function updateListTab() {
  const listEl = document.getElementById('tab-list');
  const causes = G.nodes.filter(n=>n.type==='cause');
  const events = G.nodes.filter(n=>n.type==='event');
  const effects = G.nodes.filter(n=>n.type==='effect');

  const renderCat = (title, items, color) => {
    if(!items.length) return '';
    return `
      <div>
        <div class="text-[11px] uppercase font-bold tracking-widest mb-3 flex items-center gap-2" style="color:${color}">
          <span class="w-1.5 h-1.5 rounded-full shadow-[0_0_8px_${color}88]" style="background:${color}"></span> ${title} <span class="opacity-50 text-[10px]">(${items.length})</span>
        </div>
        <div class="flex flex-col gap-2 pl-3 border-l pb-4" style="border-color:${color}33">
          ${items.map(n => {
            let label = n.label;
            if(n.type==='effect') {
              if(n.sentiment==='pos') label = '<span class="text-tertiary">▲</span> ' + label;
              else if(n.sentiment==='neg') label = '<span class="text-error">▼</span> ' + label;
            }
            return `<div class="text-[13px] text-on-surface-variant hover:text-on-surface cursor-pointer transition-colors leading-snug break-keep" onclick="focusNode('${n.id}')" title="${n.label}">${label}</div>`;
          }).join('')}
        </div>
      </div>
    `;
  };

  listEl.innerHTML = `
    ${renderCat('발생 원인 (Cause)', causes, COL['cause'])}
    ${renderCat('핵심 사건 (Event)', events, COL['event'])}
    ${renderCat('파급 효과 (Effect)', effects, COL['effect'])}
  `;
}

function setStatus(msg) { document.getElementById('status').textContent=msg; }
function fitView() {
  if(!G.nodes.length)return; const xs=G.nodes.map(n=>n.x),ys=G.nodes.map(n=>n.y);
  const minX=Math.min(...xs),maxX=Math.max(...xs),minY=Math.min(...ys),maxY=Math.max(...ys), pad=80;
  const cw=canvas.width, ch=canvas.height;
  camera.s=Math.min((cw-pad*2)/Math.max(maxX-minX,1),(ch-pad*2)/Math.max(maxY-minY,1),1.5);
  camera.x=pad-minX*camera.s+((cw-pad*2)-(maxX-minX)*camera.s)/2; camera.y=pad-minY*camera.s+((ch-pad*2)-(maxY-minY)*camera.s)/2;
}
function zoom(f) { const cx=canvas.width/2,cy=canvas.height/2; camera.x=cx-(cx-camera.x)*f; camera.y=cy-(cy-camera.y)*f; camera.s=Math.max(.15,Math.min(5,camera.s*f)); }
function toggleLabels(){showL=!showL;}

function saveChanges() {
  const out={...G,meta:{...G.meta,version:(parseFloat(G.meta?.version||1)+0.1).toFixed(1),created:new Date().toISOString().slice(0,10)}};
  const jsContent = "window.DATA = " + JSON.stringify(out,null,2) + ";";
  const blob=new Blob([jsContent],{type:'application/javascript'});
  const url=URL.createObjectURL(blob);
  const scriptName = document.getElementById('data-script').getAttribute('src');
  const a=document.createElement('a'); a.href=url; a.download=scriptName; a.click();
  URL.revokeObjectURL(url); hasChanges=false; document.getElementById('save-btn').style.display='none';
  setStatus('Saved -> ' + scriptName);
}

function exportJSON() {
  const blob=new Blob([JSON.stringify(G,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url; a.download='tempus_graph_'+new Date().toISOString().slice(0,10)+'.json'; a.click(); URL.revokeObjectURL(url);
}

document.addEventListener('keydown',e=>{
  if((e.key==='Delete'||e.key==='Backspace')&&selected&&document.activeElement===document.body) { e.preventDefault(); confirmDelete(); }
  if(e.key==='Escape') { closeModal(); hideCtxMenu(); if(searchQuery){ document.getElementById('search-input').value=''; handleSearch(''); } }
  if((e.ctrlKey||e.metaKey)&&e.key==='f') { e.preventDefault(); document.getElementById('search-input').focus(); switchTab('search'); }
});

function resize() { canvas.width=canvas.parentElement.clientWidth; canvas.height=canvas.parentElement.clientHeight; }
window.addEventListener('resize',()=>{resize();startSim(.2);});

resize(); loadData(); if(!raf)loop();

// ── Starfield ──
(function() {
  const sc = document.getElementById('star-canvas');
  const sx = sc.getContext('2d');
  let stars = [];
  function resizeStar() {
    sc.width = window.innerWidth; sc.height = window.innerHeight;
    stars = [];
    for(let i=0; i<220; i++) {
      stars.push({
        x: Math.random()*sc.width, y: Math.random()*sc.height,
        r: Math.random()*1.4+0.2, o: Math.random()*0.6+0.1,
        speed: Math.random()*0.15+0.02, phase: Math.random()*Math.PI*2
      });
    }
  }
  function drawStar(t) {
    sx.clearRect(0,0,sc.width,sc.height);
    stars.forEach(s=>{
      const ao = s.o*(0.7+0.3*Math.sin(t*0.001*s.speed+s.phase));
      sx.beginPath(); sx.arc(s.x,s.y,s.r,0,Math.PI*2);
      sx.fillStyle=`rgba(200,216,255,${ao})`; sx.fill();
    });
    requestAnimationFrame(drawStar);
  }
  window.addEventListener('resize', resizeStar);
  resizeStar(); drawStar(0);
})();
</script>
